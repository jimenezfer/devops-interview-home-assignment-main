{{- if .Values.vllm.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-assistant.fullname" . }}-vllm
  labels:
    {{- include "ai-assistant.labels" . | nindent 4 }}
    component: vllm
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    {{- include "ai-assistant.selectorLabels" . | nindent 4 }}
    component: vllm
{{- end }}
